on:
  push:
    tags:
      - 'v*.*.*'
jobs:
  check-master:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - id: check
        run: |
          echo "proceed=$(git branch -r --contains $GITHUB_SHA | grep -q 'origin/master' && echo true || echo false)" >> $GITHUB_OUTPUT
              echo "proceed=false" >> $GITHUB_OUTPUT
  api:
    runs-on: ubuntu-latest
    needs: check-master
    environment: dockerhub-push
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: hurtki
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: docker/setup-buildx-action@v2
      - name: Docker build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker buildx build --push -t hurtki/github-banners-api:$VERSION ./api/
  renderer:
    runs-on: ubuntu-latest
    needs: check-master
    environment: dockerhub-push
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: hurtki
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: docker/setup-buildx-action@v2
      - name: Docker build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker buildx build --push -t hurtki/github-banners-renderer:$VERSION ./renderer/
  storage:
    runs-on: ubuntu-latest
    needs: check-master
    environment: dockerhub-push
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v2
        with:
          username: hurtki
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - uses: docker/setup-buildx-action@v2
      - name: Docker build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker buildx build --push -t hurtki/github-banners-storage:$VERSION ./storage/
